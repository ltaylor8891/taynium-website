<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Technical line illustration representing the founder">
  <rect x="0.5" y="0.5" width="399" height="499" fill="#1c222b" stroke="#2a313b"/>
  <!-- corner ticks -->
  <path d="M0.5 20 V0.5 H20" stroke="#d9662e" stroke-width="2" fill="none"/>
  <path d="M380 0.5 H399.5 V20" stroke="#d9662e" stroke-width="2" fill="none"/>
  <path d="M0.5 480 V499.5 H20" stroke="#d9662e" stroke-width="2" fill="none"/>
  <path d="M399.5 480 V499.5 H380" stroke="#d9662e" stroke-width="2" fill="none"/>

  <!-- construction grid -->
  <g stroke="#2a313b" stroke-width="1">
    <line x1="0" y1="125" x2="400" y2="125"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="375" x2="400" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
  </g>

  <!-- head/shoulders profile drafted as line art -->
  <g fill="none" stroke="#97a1ad" stroke-width="1.6">
    <path d="M150 210 C150 155 172 122 200 122 C228 122 250 155 250 210 C250 232 244 246 236 258 L236 272 C270 282 300 300 312 340 L312 420 H88 L88 340 C100 300 130 282 164 272 L164 258 C156 246 150 232 150 210 Z"/>
  </g>
  <!-- dimension lines around the profile -->
  <g stroke="#4fa6b0" stroke-width="1" fill="none">
    <line x1="150" y1="95" x2="250" y2="95"/>
    <line x1="150" y1="90" x2="150" y2="100"/>
    <line x1="250" y1="90" x2="250" y2="100"/>
    <line x1="60" y1="122" x2="60" y2="420"/>
    <line x1="55" y1="122" x2="65" y2="122"/>
    <line x1="55" y1="420" x2="65" y2="420"/>
  </g>
  <text x="200" y="82" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#4fa6b0" letter-spacing="1">REF. PROFILE</text>
  <text x="40" y="272" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#4fa6b0" letter-spacing="1" transform="rotate(-90 40 272)">SHEET HT.</text>

  <text x="200" y="460" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="12" fill="#e7e9ec" letter-spacing="1">LUKE TAYLOR</text>
  <text x="200" y="478" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#97a1ad" letter-spacing="1">FOUNDER — TAYNIUM</text>
</svg>
