<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Technical line drawing of a modular roller-table machine with dimension callouts">
  <rect x="0.5" y="0.5" width="799" height="379" fill="#1c222b" stroke="#2a313b"/>
  <path d="M0.5 24 V0.5 H24" stroke="#d9662e" stroke-width="2" fill="none"/>
  <path d="M776 0.5 H799.5 V24" stroke="#d9662e" stroke-width="2" fill="none"/>
  <path d="M0.5 356 V379.5 H24" stroke="#d9662e" stroke-width="2" fill="none"/>
  <path d="M799.5 356 V379.5 H776" stroke="#d9662e" stroke-width="2" fill="none"/>

  <!-- ground / grid -->
  <g stroke="#2a313b" stroke-width="1">
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="380"/>
    <line x1="700" y1="0" x2="700" y2="380"/>
  </g>

  <!-- legs -->
  <g stroke="#97a1ad" stroke-width="1.6" fill="none">
    <line x1="150" y1="230" x2="150" y2="300"/>
    <line x1="220" y1="230" x2="220" y2="300"/>
    <line x1="580" y1="230" x2="580" y2="300"/>
    <line x1="650" y1="230" x2="650" y2="300"/>
  </g>

  <!-- table frame -->
  <rect x="120" y="190" width="560" height="40" fill="none" stroke="#e7e9ec" stroke-width="1.8"/>

  <!-- rollers -->
  <g stroke="#4fa6b0" stroke-width="2">
    <line x1="150" y1="200" x2="150" y2="220"/>
    <line x1="200" y1="200" x2="200" y2="220"/>
    <line x1="250" y1="200" x2="250" y2="220"/>
    <line x1="300" y1="200" x2="300" y2="220"/>
    <line x1="350" y1="200" x2="350" y2="220"/>
    <line x1="400" y1="200" x2="400" y2="220"/>
    <line x1="450" y1="200" x2="450" y2="220"/>
    <line x1="500" y1="200" x2="500" y2="220"/>
    <line x1="550" y1="200" x2="550" y2="220"/>
    <line x1="600" y1="200" x2="600" y2="220"/>
    <line x1="650" y1="200" x2="650" y2="220"/>
  </g>

  <!-- guard end -->
  <rect x="640" y="150" width="45" height="40" fill="none" stroke="#e7e9ec" stroke-width="1.6"/>
  <circle cx="662" cy="230" r="4" fill="#d9662e"/>

  <!-- dimension line across full width -->
  <g stroke="#4fa6b0" stroke-width="1" fill="none">
    <line x1="120" y1="260" x2="680" y2="260"/>
    <line x1="120" y1="255" x2="120" y2="265"/>
    <line x1="680" y1="255" x2="680" y2="265"/>
  </g>
  <text x="400" y="278" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#4fa6b0" letter-spacing="1">TABLE LENGTH — CONFIGURABLE</text>

  <text x="400" y="50" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="12" fill="#e7e9ec" letter-spacing="2">MODULAR ROLLER-TABLE — GA SCHEMATIC</text>
  <text x="400" y="70" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#97a1ad" letter-spacing="1">FOR ILLUSTRATION ONLY — NOT TO SCALE</text>
</svg>
